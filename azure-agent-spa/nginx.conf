server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Dynamic DNS resolution — prevents 502 when backend pods rescale/restart.
    # NAMESERVER is injected by docker-entrypoint.sh from /etc/resolv.conf.
    resolver ${NAMESERVER} valid=15s ipv6=off;
    set $fastapi_backend ${FASTAPI_BACKEND_URL};

    # Extract backend hostname for correct Host header on proxied requests.
    set $backend_host ${FASTAPI_BACKEND_HOST};

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Enable SNI so the Container Apps Envoy proxy can route HTTPS correctly.
    proxy_ssl_server_name on;

    # Proxy /chat to FastAPI backend
    location /chat {
        proxy_pass $fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Proxy /subscriptions to FastAPI backend
    location /subscriptions {
        proxy_pass $fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy /reports to FastAPI backend
    location /reports {
        proxy_pass $fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy /events (SSE) to FastAPI backend
    location /events {
        proxy_pass $fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE specific settings
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # Proxy /health to FastAPI backend
    location /health {
        proxy_pass $fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
